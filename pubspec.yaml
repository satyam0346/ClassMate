name: classmate
description: ClassMate — University class management app for Marwadi University.
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase ──────────────────────────────────────────────
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3
  firebase_remote_config: ^5.1.3
  google_sign_in: ^6.2.2

  # ── State & Navigation ────────────────────────────────────
  flutter_riverpod: ^2.5.1
  go_router: ^14.6.1

  # ── Security ──────────────────────────────────────────────
  flutter_secure_storage: ^9.2.2
  flutter_dotenv: ^5.2.1
  flutter_jailbreak_detection: ^1.10.0

  # ── HTTP (FCM HTTP v1 API + logging interceptor) ──────────
  dio: ^5.7.0

  # ── UI & Animations ───────────────────────────────────────
  google_fonts: ^6.2.1
  lottie: ^3.1.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_animate: ^4.5.0

  # ── Notifications ─────────────────────────────────────────
  flutter_local_notifications: ^17.2.4

  # ── Utilities ─────────────────────────────────────────────
  connectivity_plus: ^6.1.0
  intl: ^0.19.0
  path_provider: ^2.1.4
  path: ^1.9.0
  flutter_cache_manager: ^3.4.1
  flutter_image_compress: ^2.3.0
  image_picker: ^1.1.2
  url_launcher: ^6.3.1
  file_picker: ^8.1.2
  package_info_plus: ^8.1.1
  shared_preferences: ^2.3.3
  timezone: ^0.9.4
  googleapis_auth: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  # flutter_dotenv: declare the .env asset
  assets:
    - .env
    - assets/service_account.json

  # Fonts — loaded via google_fonts package (no local font files needed)
